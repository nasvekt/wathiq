# fly.toml app configuration file generated for wathiq on 2026-06-06T19:38:48Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'wathiq'
primary_region = 'ams'

[build]
  dockerfile = 'backend/Dockerfile'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
